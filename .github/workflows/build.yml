name: build

# Build + test mọi nền tảng, đẩy artifact. Khi push tag v* thì gom exe + apk vào một
# GitHub Release. Không cần secret nào: apk là bản debug (ký bằng khoá debug nên cài
# được ngay); muốn bản release đã ký thì thêm keystore + signingConfig sau.
#
# Nguyên tắc: nơi nào chạy được thì CI gọi ĐÚNG lệnh dev dùng local (make test-ctest,
# make coverage, make build-android, make build-ios) — CI đồng thời là nơi kiểm tra
# nhánh macOS/Ubuntu của Makefile mà máy dev Windows không tự chạy được.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Core tests trên Ubuntu (gcc) + macOS (AppleClang): lõi thuần C++20, offline
  # (không mạng/GPU/submodule). Tín hiệu pass/fail ĐỘC LẬP với bản dựng artifact —
  # thấy đỏ là lỗi ở logic lõi hoặc tính portable, không phải toolchain đóng gói.
  # (MSVC được phủ ở job windows bên dưới, cũng chạy CTest.)
  # ---------------------------------------------------------------------------
  core-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4   # không cần submodule: core không đụng nvenc

      # Preset dùng generator Ninja trên mọi OS.
      - name: Install Ninja
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq && sudo apt-get install -y ninja-build
          else
            brew install ninja
          fi

      - name: Build + run core tests (make test-ctest)
        run: make test-ctest

  # ---------------------------------------------------------------------------
  # Coverage của core: đúng lệnh dev chạy local (make coverage — clang instrument
  # + llvm-cov, xem Makefile). Chạy trên Ubuntu cho rẻ; toolchain cài giống hệt
  # bootstrap.sh (clang + llvm). Báo cáo HTML đẩy lên làm artifact để tải về xem;
  # chưa đặt ngưỡng % bắt buộc — bảng tổng kết in ngay trong log job.
  # ---------------------------------------------------------------------------
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # không cần submodule: core không đụng nvenc

      - name: Install clang + llvm + ninja
        run: sudo apt-get update -qq && sudo apt-get install -y clang llvm ninja-build

      - name: Build + measure coverage (make coverage)
        run: make coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: out/coverage
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows: một exe duy nhất (host + client). Build preset Release bằng Ninja +
  # MSVC, chạy lại core_tests trên chính toolchain đó trước khi xuất artifact.
  # (Không qua make: runner không có GNU make sẵn, và VsDevCmd đã có ilammy lo.)
  # ---------------------------------------------------------------------------
  windows:
    needs: core-tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # third_party/nvenc-13.0 (nvEncodeAPI.h) là submodule

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        run: choco install ninja -y

      - name: Configure
        run: cmake --preset x64-release

      - name: Build
        run: cmake --build --preset x64-release

      - name: Run core tests (CTest, offline)
        run: ctest --test-dir out/build/x64-release --output-on-failure

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: deskhub-windows
          path: out/build/x64-release/client/windows/client.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Android: apk debug (UI Kotlin + libdeskhub.so). NDK/CMake pin đúng phiên bản
  # build.gradle.kts đang khoá để khớp cách căn trang nhớ 16 KB.
  # ---------------------------------------------------------------------------
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        run: sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Build debug APK (make build-android)
        run: make build-android

      - name: Upload apk
        uses: actions/upload-artifact@v4
        with:
          name: deskhub-android
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # iOS: build check cho Simulator (target `app`, không cần signing) — bắt lỗi
  # compile Swift/ObjC++/core trên toolchain Xcode. Chưa xuất artifact: bản
  # Simulator không cài được máy thật, ipa thật cần signing team (để sau).
  # ---------------------------------------------------------------------------
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build iOS app for Simulator (make build-ios)
        run: make build-ios

  # ---------------------------------------------------------------------------
  # Release: chỉ chạy khi push tag v*. Gom artifact của windows + android rồi đính
  # vào một GitHub Release. Tên file mang tag để tải về khỏi nhầm phiên bản.
  # ---------------------------------------------------------------------------
  release:
    needs: [windows, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename with tag
        run: |
          mkdir -p out
          cp dist/deskhub-windows/client.exe   "out/deskhub-${GITHUB_REF_NAME}.exe"
          cp dist/deskhub-android/app-debug.apk "out/deskhub-${GITHUB_REF_NAME}.apk"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/deskhub-${{ github.ref_name }}.exe
            out/deskhub-${{ github.ref_name }}.apk
