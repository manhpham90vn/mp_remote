name: lint

# Kiểm tra style, không build sản phẩm. Bốn job độc lập chạy song song:
#   cpp-format  — clang-format cho core/ platform/ client/ (theo .clang-format)
#   swift       — swiftlint cho client/ios (Swift)
#   kotlin      — ktlint cho tầng UI Kotlin (theo .editorconfig)
#   android     — Android Lint (gradlew lint) trên module app
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  cpp-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ghim ĐÚNG phiên bản để kết quả trùng khít clang-format cục bộ (VS LLVM 22.1.3).
      # clang-format khác major cho output khác nhau nên không dùng bản mặc định của runner.
      - name: Install clang-format 22.1.3
        run: pipx install clang-format==22.1.3

      - name: clang-format check
        run: |
          files=$(find core platform client -type f \
            \( -name '*.h' -o -name '*.hpp' -o -name '*.cpp' -o -name '*.cc' -o -name '*.c' \
               -o -name '*.mm' -o -name '*.m' \))
          echo "$files"
          clang-format --dry-run --Werror $files

  kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint
          chmod +x ktlint
          sudo mv ktlint /usr/local/bin/

      - name: ktlint check
        run: ktlint "client/android/**/*.kt"

  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint check
        run: swiftlint lint --strict client/ios/app/swift

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/android
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Android Lint
        run: |
          chmod +x ./gradlew
          ./gradlew lint --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: client/android/app/build/reports/lint-results-*.html
          if-no-files-found: ignore
