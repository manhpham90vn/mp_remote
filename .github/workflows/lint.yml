name: lint

# Kiểm tra style, không build sản phẩm. Ba job độc lập chạy song song:
#   codestyle    — clang-format (C++) + ktlint (Kotlin) + swiftformat (Swift) qua
#                  scripts/codestyle.sh --check: ĐÚNG script dev chạy local (make lint)
#                  nên CI và máy dev không bao giờ lệch luật
#   swiftlint    — SwiftLint --strict cho client/ios (lint sâu riêng của Swift,
#                  ngoài phạm vi codestyle)
#   android-lint — Android Lint (gradlew lint) trên module app
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  codestyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ktlint chạy bằng java.
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Version ghim phải khớp scripts/bootstrap.ps1 + bootstrap.sh (nguồn chuẩn của pin).
      # Không chạy nguyên bootstrap.sh vì nó kéo cả Android SDK/NDK — quá nặng cho job style.
      - name: Install pinned tools (clang-format 22.1.3, ktlint 1.5.0, swiftformat 0.62.1)
        run: |
          pipx install clang-format==22.1.3
          mkdir -p tools
          curl -sSL -o tools/ktlint.jar https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint
          curl -sSL -o /tmp/swiftformat.zip https://github.com/nicklockwood/SwiftFormat/releases/download/0.62.1/swiftformat_linux.zip
          unzip -o -q -d tools /tmp/swiftformat.zip swiftformat_linux
          mv tools/swiftformat_linux tools/swiftformat
          chmod +x tools/swiftformat

      - name: codestyle check (cpp + kotlin + swift)
        run: scripts/codestyle.sh --check

  swiftlint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint check
        run: swiftlint lint --strict client/ios/app/swift

  android-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/android
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Android Lint
        run: ./gradlew lint --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: client/android/app/build/reports/lint-results-*.html
          if-no-files-found: ignore
